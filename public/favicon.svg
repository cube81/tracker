<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="90" cy="90" r="90" fill="url(#grad)"/>

  <!-- Clock circle -->
  <circle cx="90" cy="90" r="70" fill="white" opacity="0.1"/>
  <circle cx="90" cy="90" r="65" fill="none" stroke="white" stroke-width="4"/>

  <!-- Hour markers -->
  <g stroke="white" stroke-width="2">
    <line x1="90" y1="30" x2="90" y2="40" stroke-width="3"/>
    <line x1="135.6" y1="40" x2="131.5" y2="48.5" stroke-width="2"/>
    <line x1="150" y1="90" x2="140" y2="90" stroke-width="3"/>
    <line x1="131.5" y1="131.5" x2="125.6" y2="125.6" stroke-width="2"/>
    <line x1="90" y1="150" x2="90" y2="140" stroke-width="3"/>
    <line x1="48.5" y1="131.5" x2="54.4" y2="125.6" stroke-width="2"/>
    <line x1="30" y1="90" x2="40" y2="90" stroke-width="3"/>
    <line x1="48.5" y1="48.5" x2="54.4" y2="54.4" stroke-width="2"/>
  </g>

  <!-- Hour hand -->
  <line x1="90" y1="90" x2="90" y2="55" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="90" y1="90" x2="90" y2="35" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Center dot -->
  <circle cx="90" cy="90" r="6" fill="white"/>
</svg>